<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Températures Paris - Ligne</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    /* Design Global */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; color: #333; }
    
    /* Barre de navigation */
    .navbar { background-color: #2c3e50; padding: 15px 30px; display: flex; justify-content: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .navbar a { color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; transition: background 0.3s, transform 0.2s; }
    .navbar a:hover { background-color: #3498db; transform: translateY(-2px); }
    
    /* Conteneur principal */
    .container { max-width: 900px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 30px; }
    #status { text-align: center; margin-top: 15px; color: #7f8c8d; font-style: italic; }
  </style>
  
  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        const rows = await fetchParisData();
        drawChart(rows);
      } catch (err) {
        document.getElementById('status').textContent = "Erreur: " + err.message;
      }
    }

    async function fetchParisData() {
      const res = await fetch('/paris', { headers: { 'Accept': 'application/json' } });
      const json = await res.json();
      const rows = json.map(p => {
        const [datePart, timePart] = p.datetime.split('T');
        const [y, m, d] = datePart.split('-').map(Number);
        const [hh, mm] = timePart.split(':').map(Number);
        return [new Date(y, m - 1, d, hh, mm, 0), Number(p.temperature_c)];
      });
      rows.sort((a, b) => a[0] - b[0]);
      return rows;
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Date/Heure');
      data.addColumn('number', 'Température (°C)');
      data.addRows(rows);

      const options = {
        colors: ['#e74c3c'],
        legend: { position: 'bottom' },
        hAxis: { title: 'Date/Heure', format: 'dd/MM HH:mm' },
        vAxis: { title: '°C' },
        chartArea: {width: '85%', height: '70%'}
      };

      const chart = new google.visualization.LineChart(document.getElementById('chart_div'));
      chart.draw(data, options);
      document.getElementById('status').textContent = `OK — ${rows.length} points chargés.`;
    }
  </script>
</head>
<body>
  <div class="navbar">
    <a href="/contact">📞 Contact</a>
    <a href="/rapport">📈 Ligne (Paris)</a>
    <a href="/histogramme">📊 Histogramme (Paris)</a>
    <a href="/atelier">💨 Vent (Marseille)</a>
  </div>

  <div class="container">
    <h2>Températures horaires — Paris (LineChart)</h2>
    <div id="chart_div" style="width: 100%; height: 500px;"></div>
    <div id="status">Chargement des données...</div>
  </div>
</body>
</html>
