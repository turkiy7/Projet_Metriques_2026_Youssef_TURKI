<!doctype html>
<html lang="fr">
<head>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(drawChart);

    async function drawChart() {
      const res = await fetch('/marseille');
      const json = await res.json();
      
      const rows = json.map(p => {
        return [p.datetime.replace('T', ' '), Number(p.wind_speed)];
      });

      const data = new google.visualization.DataTable();
      data.addColumn('string', 'Date/Heure');
      data.addColumn('number', 'Vitesse du Vent (km/h)');
      data.addRows(rows);

      const options = {
        title: 'Vitesse du Vent à Marseille (Area Chart)',
        hAxis: { title: 'Date et Heure',  textStyle: {fontSize: 10} },
        vAxis: { title: 'Vitesse (km/h)' },
        colors: ['#4285F4'],
        areaOpacity: 0.3
      };

      const chart = new google.visualization.AreaChart(document.getElementById('chart_div'));
      chart.draw(data, options);
    }
  </script>
</head>
<body>
  <h2>Mon Dashboard de Métrologie Personnel</h2>
  <div id="chart_div" style="width: 100%; height: 500px;"></div>
</body>
</html>
