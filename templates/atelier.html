<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Dashboard Métrologie</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; color: #333; }
    .navbar { background-color: #2c3e50; padding: 15px 30px; display: flex; justify-content: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; }
    .navbar a { color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; transition: background 0.3s, transform 0.2s; }
    .navbar a:hover { background-color: #3498db; transform: translateY(-2px); }
    .container { max-width: 900px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 30px; }
    .loading { text-align: center; font-style: italic; color: #7f8c8d; padding: 50px 0; }
  </style>
  <script>
    // Méthode moderne et robuste pour charger Google Charts
    google.charts.load('current', { packages: ['corechart'] }).then(drawChart);

    async function drawChart() {
      try {
        // Le "?t=" empêche le navigateur de tricher avec le cache
        const res = await fetch('/marseille?t=' + new Date().getTime());
        if (!res.ok) throw new Error("Le serveur Flask ne répond pas correctement.");
        
        const json = await res.json();
        const rows = json.map(p => [p.datetime.replace('T', ' '), Number(p.wind_speed)]);

        const data = new google.visualization.DataTable();
        data.addColumn('string', 'Date/Heure');
        data.addColumn('number', 'Vitesse du Vent (km/h)');
        data.addRows(rows);

        const options = {
          hAxis: { title: 'Date et Heure', textStyle: {fontSize: 10} },
          vAxis: { title: 'Vitesse (km/h)' },
          colors: ['#3498db'],
          areaOpacity: 0.2,
          chartArea: {width: '85%', height: '70%'}
        };

        const chart = new google.visualization.AreaChart(document.getElementById('chart_div'));
        chart.draw(data, options);
      } catch (error) {
        document.getElementById('chart_div').innerHTML = `<p style="color: red; text-align: center; font-weight: bold;">Erreur : ${error.message}</p>`;
      }
    }
  </script>
</head>
<body>
  <div class="navbar">
    <a href="/">🏠 Accueil</a>
    <a href="/contact">📞 Contact</a>
    <a href="/rapport">📈 Ligne (Paris)</a>
    <a href="/histogramme">📊 Histogramme (Paris)</a>
    <a href="/atelier">💨 Vent (Marseille)</a>
  </div>
  <div class="container">
    <h2>Mon Dashboard de Métrologie - Vent à Marseille</h2>
    <div id="chart_div" style="width: 100%; height: 500px;">
      <div class="loading">⏳ Chargement des données en cours...</div>
    </div>
  </div>
</body>
</html>
