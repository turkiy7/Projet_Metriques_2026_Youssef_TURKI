<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Menu Principal - Métriques</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; max-width: 600px; width: 100%; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 15px; margin-bottom: 30px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .menu-btn { display: block; padding: 20px; background-color: #3498db; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; transition: background 0.3s, transform 0.2s; }
        .menu-btn:hover { background-color: #2980b9; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Projet Métriques</h1>
        <p style="color: #7f8c8d; margin-bottom: 30px;">Sélectionnez le module que vous souhaitez consulter :</p>
        <div class="menu-grid">
            <a href="/rapport" class="menu-btn">📈 Ligne (Paris)</a>
            <a href="/histogramme" class="menu-btn">📊 Histogramme (Paris)</a>
            <a href="/atelier" class="menu-btn">💨 Vent (Marseille)</a>
            <a href="/contact" class="menu-btn" style="background-color: #2c3e50;">📞 Page de Contact</a>
        </div>
    </div>
</body>
</html>
