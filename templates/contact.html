<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contactez-nous</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; color: #333; }
        .navbar { background-color: #2c3e50; padding: 15px 30px; display: flex; justify-content: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; transition: background 0.3s, transform 0.2s; }
        .navbar a:hover { background-color: #3498db; transform: translateY(-2px); }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; transition: border 0.3s; }
        input:focus, textarea:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="navbar">
      <a href="/">🏠 Accueil</a>
      <a href="/contact">📞 Contact</a>
      <a href="/rapport">📈 Ligne (Paris)</a>
      <a href="/histogramme">📊 Histogramme (Paris)</a>
      <a href="/atelier">💨 Vent (Marseille)</a>
    </div>
    <div class="container">
        <h2>Laissez un message</h2>
        <form action="#" method="POST">
            <input type="text" name="nom" placeholder="Votre Nom" required>
            <input type="text" name="prenom" placeholder="Votre Prénom" required>
            <textarea name="message" rows="5" placeholder="Écrivez votre message ici..." required></textarea>
            <button type="submit">Envoyer le message</button>
        </form>
    </div>
</body>
</html>
